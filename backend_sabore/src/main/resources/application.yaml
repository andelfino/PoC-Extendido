spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contenedor_1}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
  mercadopago:
    access-token: ${APP_MERCADOPAGO_ACCESS_TOKEN}
  paypal:
    client-id: ${APP_PAYPAL_CLIENT_ID:}
    client-secret: ${APP_PAYPAL_CLIENT_SECRET:}
    base-url: ${APP_PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
  conversion:
    uyu-to-usd-rate: ${APP_UYU_TO_USD_RATE:40}